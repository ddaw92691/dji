# Mall System Nginx Configuration
# Place in /etc/nginx/conf.d/

upstream api_upstream { server api:8080; }
upstream customer_upstream { server customer-web:80; }
upstream admin_upstream { server admin-web:80; }
upstream merchant_upstream { server merchant-web:80; }

server {
    listen 80;
    server_name api.example.com;
    gzip on; gzip_types text/plain application/json;
    location / { proxy_pass http://api_upstream; proxy_set_header Host $host; proxy_set_header X-Real-IP $remote_addr; }
    location /ws {
        proxy_pass http://api_upstream/ws;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 86400;
    }
    location /ws/ {
        proxy_pass http://api_upstream/ws/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 86400;
    }
    location /uploads/ { alias /app/uploads/; }
}

server {
    listen 80;
    server_name customer.example.com;
    gzip on; gzip_types text/css application/javascript;
    location / { proxy_pass http://customer_upstream; proxy_set_header Host $host; }
}

server {
    listen 80;
    server_name admin.example.com;
    gzip on; gzip_types text/css application/javascript;
    location / { proxy_pass http://admin_upstream; proxy_set_header Host $host; }
}

server {
    listen 80;
    server_name merchant.example.com;
    gzip on; gzip_types text/css application/javascript;
    location / { proxy_pass http://merchant_upstream; proxy_set_header Host $host; }
}
