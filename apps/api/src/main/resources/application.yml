server:
  port: ${SERVER_PORT:8080}

spring:
  application:
    name: mall-api
  sql:
    init:
      mode: always
      schema-locations:
        - classpath:sql/schema.sql
        - classpath:db/V2__catalog_tax_websocket_indexes.sql
        - classpath:db/V3__merchant_application_review_fields.sql
      continue-on-error: true
  datasource:
    driver-class-name: org.postgresql.Driver
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:mall_system}
    username: ${DB_USERNAME:mall_user}
    password: ${DB_PASSWORD}
  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: Asia/Shanghai
    default-property-inclusion: non_null

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.nologging.NoLoggingImpl
  global-config:
    db-config:
      id-type: assign_id

jwt:
  secret: ${JWT_SECRET}
  expiration: 86400000

google:
  client-id: ${GOOGLE_CLIENT_ID:}

knife4j:
  enable: ${SWAGGER_ENABLED:false}
  setting:
    language: zh_cn

springdoc:
  api-docs:
    enabled: ${SWAGGER_ENABLED:false}
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
  group-configs:
    - group: 'default'
      paths-to-match: '/**'
      packages-to-scan: com.mall.api.modules

logging:
  level:
    com.mall.api: ${LOG_LEVEL:INFO}
    org.springframework.security: WARN
